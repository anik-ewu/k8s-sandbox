# ============================================================
# Kubernetes Secret — MongoDB Credentials
# ============================================================
# Secrets store sensitive data as base64-encoded values.
# base64 is NOT encryption — it's just encoding!
# For real encryption at rest, enable K8s EncryptionConfig.
#
# How to generate base64 values:
#   echo -n 'username' | base64   →  dXNlcm5hbWU=
#   echo -n 'password' | base64   →  cGFzc3dvcmQ=
#
# ⚠️  NEVER commit this file to git with real credentials!
#     Add mongo-secret.yaml to your .gitignore
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret         # This name is referenced in the Pod YAML
type: Opaque                   # Generic secret type (key-value pairs)
data:
  mongo-root-username: dXNlcm5hbWU=   # base64 of 'username'
  mongo-root-password: cGFzc3dvcmQ=   # base64 of 'password'
